 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TrustDocs Secure Vault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-bg">
    <header class="navbar">
        <h2>TrustDocs</h2>
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="signup.html">Sign Up</a>
            <a href="dashboard.html">Dashboard</a>
        </nav>
    </header>

    <main class="login-wrapper">
        <div class="login-container">
            <div class="login-info">
                <h3>Welcome Back to Your Vault.</h3>
                <p>Your documents are protected with AES-256 encryption. Only you hold the master key.</p>
                <div class="security-badge">Verified Secure 🔒</div>
            </div>

            <div class="login-form-box">
                <form id="loginForm">
                    <h2>Unlock Vault</h2>
                    
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" id="loginEmail" placeholder="Enter your email" required>
                    </div>

                    <div class="input-group">
                        <label>Master Password</label>
                        <div class="pass-wrapper">
                            <input type="password" id="loginPass" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label><input type="checkbox"> Remember this device</label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn-primary full-width">Decrypt & Access</button>
                    
                    <p class="auth-footer">
                        Don't have a vault yet? <a href="signup.html">Create one here</a>
                    </p>
                </form>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
